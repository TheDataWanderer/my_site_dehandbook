site_name: 'Data Engineering Knowledge Base'
site_description: 'Личная база знаний и проекты Data Engineer'
site_author: 'Максим'
site_url: 'https://dehandbook.ru/'

# 📘 Тема
theme:
  name: 'material'
  favicon: assets/images/favicon.png
  language: 'ru'
  features:
    - navigation.expand
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.path
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: indigo
  font:
    text: Roboto
    code: Roboto Mono

# 📁 Навигация
nav:
  - Главная: index.md
  - Обо мне: about.md
  - Проекты: projects.md
  - База знаний:
      - Обзор: knowledge/index.md
      - Airflow:
          - Обзор: knowledge/airflow/index.md
      - DWH:
          - Обзор: knowledge/dwh/index.md
      - Git:
          - Обзор: knowledge/git/index.md
      - Linux:
          - Обзор: knowledge/linux/index.md
      - PostgreSQL:
          - Обзор: knowledge/postgresql/index.md 
          - Условное выражение CASE: knowledge/postgresql/case_when.md
      - Python:
          - Основы: knowledge/python/index.md
      - Obsidian:
          - Обзор: knowledge/obsidian/index.md
      - Заметки: knowledge/notes/index.md
  - Мои курсы:
      - Обзор: courses/index.md
      - Excel для менеджеров:
          - Обзор: courses/excel/index.md
          - Лекции: courses/excel/lectures/index.md
          - Домашние задания: courses/excel/homework/index.md
          - Ресурсы: courses/excel/resources/index.md
      - PostgreSQL:
          - Обзор: courses/postgresql/index.md
          - Лекции:
              - Лекция 1: courses/postgresql/lectures/lecture_01.md
              - Лекция 2: courses/postgresql/lectures/lecture_02.md
              - Лекция 3: courses/postgresql/lectures/lecture_03.md
              - Лекция 4: courses/postgresql/lectures/lecture_04.md
              - Лекция 5: courses/postgresql/lectures/lecture_05.md
          - Домашние задания:
              - Задание 1: courses/postgresql/homework/hw_01.md
              - Задание 2: courses/postgresql/homework/hw_02.md
              - Задание 3: courses/postgresql/homework/hw_03.md
              - Задание 4: courses/postgresql/homework/hw_04.md
              - Задание 5: courses/postgresql/homework/hw_05.md
              - Проверочная работа: courses/postgresql/homework/control_work.md
              - Экзамен: courses/postgresql/homework/examination_work.md
          - Ресурсы: courses/postgresql/resources/index.md
  - Медиа: media.md
  - Полезные ресурсы: resources.md

# 🧩 Расширения Markdown
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.emoji

# 🔍 Плагины
plugins:
  - search
  - tags
  - git-revision-date-localized:
      enable_creation_date: true
  - awesome-pages

hooks:
  - hooks.py

# 📄 Дополнительно
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TheDataWanderer
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/nefatov/
    - icon: fontawesome/brands/telegram
      link: https://t.me/maksim_flow
  generator: false
